name: Pump Ignition Alert

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pump-ignition
  cancel-in-progress: false

jobs:
  pump:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        run: pip install ccxt requests numpy

      - name: run pump scan
        env:
          DISCORD_WEBHOOK_PUMP: ${{ secrets.DISCORD_WEBHOOK_PUMP }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python pump_scan.py

      - name: commit data (state + logs)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "data: scan $(date -u +%FT%TZ)"
          git push
